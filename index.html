<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolo Pages · 独立展示页集合</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3347;
      --accent: #7eb8f7;
      --accent2: #e55c5c;
      --text: #e2e4ee;
      --text-muted: #8b90a8;
      --tag-bg: #1e2438;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',-apple-system,sans-serif;
      min-height: 100vh; line-height: 1.8;
    }

    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-brand { font-size: 16px; font-weight: 700; }
    .topbar-brand span { color: var(--accent2); }
    .topbar-sub { font-size: 13px; color: var(--text-muted); }
    .topbar-link { margin-left: auto; font-size: 13px; color: var(--accent); text-decoration: none; }
    .topbar-link:hover { text-decoration: underline; }

    .hero { padding: 64px 32px 40px; max-width: 860px; margin: 0 auto; }
    .hero h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; line-height: 1.3; }
    .hero h1 em { color: var(--accent); font-style: normal; }
    .hero p { color: var(--text-muted); font-size: 15px; max-width: 480px; }

    .grid {
      max-width: 860px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px; padding: 0 32px 80px;
    }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 28px; text-decoration: none;
      transition: border-color .2s, transform .2s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .card-icon { font-size: 28px; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text); line-height: 1.4; }
    .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; flex: 1; }
    .card-tag {
      display: inline-block; padding: 2px 10px; border-radius: 20px;
      background: var(--tag-bg); color: var(--text-muted); font-size: 11px;
      align-self: flex-start; margin-top: 4px;
    }

    footer {
      text-align: center; padding: 28px; font-size: 12px;
      color: var(--text-muted); border-top: 1px solid var(--border);
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 600px) {
      .hero { padding: 40px 18px 28px; }
      .hero h1 { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; padding: 0 18px 60px; }
      .topbar { padding: 14px 18px; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div>
    <div class="topbar-brand">Dolo <span>Pages</span></div>
    <div class="topbar-sub">独立展示页集合</div>
  </div>
  <a class="topbar-link" href="https://doloressusu.github.io/dolo-reads/">← Dolo Reads</a>
</header>

<div class="hero">
  <h1>每一个页面，<em>都是一段故事</em></h1>
  <p>这里收录了我制作的独立展示页——演讲稿、个人写作、设计方案。每个链接都是一次真实的输出。</p>
</div>

<div class="grid">

  <a class="card" href="super-individual-talk/">
    <div class="card-icon">🎤</div>
    <div class="card-title">从大厂裸辞，用 AI 重塑工作</div>
    <div class="card-desc">15 分钟交互式演讲幻灯片 · 如何成为"超级个体"</div>
    <span class="card-tag">#演讲</span>
  </a>

  <a class="card" href="sleep-remedy/">
    <div class="card-icon">🌙</div>
    <div class="card-title">晚睡自救药方</div>
    <div class="card-desc">写给那个从 12 岁就开始鞭打自己的你</div>
    <span class="card-tag">#个人写作</span>
  </a>

  <a class="card" href="brand-brainstorm/">
    <div class="card-icon">🎨</div>
    <div class="card-title">品牌名称 & LOGO 方案</div>
    <div class="card-desc">品牌设计头脑风暴参考页，供内部查阅</div>
    <span class="card-tag">#设计</span>
  </a>

</div>

<footer>
  <a href="https://github.com/DoloresSusu/dolo-pages">GitHub</a> ·
  Made by <a href="https://github.com/DoloresSusu">多乐 Dolo</a>
</footer>

</body>
</html>
